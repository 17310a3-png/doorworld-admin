<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>門的世界 — 管理後台</title>
  <script>
    // SPA redirect for GitHub Pages
    var path = window.location.pathname;
    var base = '/doorworld-admin-react/';
    if (path.startsWith(base)) {
      var route = path.slice(base.length);
      if (route && route !== 'index.html') {
        sessionStorage.setItem('spa_redirect', '/' + route);
        window.location.replace(base);
      }
    }
  </script>
</head>
<body></body>
</html>
